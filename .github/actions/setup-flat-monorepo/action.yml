name: Setup Flat monorepo packages
description: Link local monorepo packages into FLAT_HOME so Airship can resolve FlatLang dependencies without cloning archived repos.
inputs:
  prebuild-targets:
    description: "Space or comma separated Airship targets whose compiler/runtime jars should be prebuilt (for example: es6, js, java)."
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      env:
        PREBUILD_TARGETS: ${{ inputs.prebuild-targets }}
      run: |
        set -euo pipefail

        repo_root="${GITHUB_WORKSPACE:-$PWD}"
        flat_home="${FLAT_HOME:-$HOME/.flat}"
        package_root="$flat_home/packages/github.com/FlatLang"

        mkdir -p "$package_root"

        for package in "$repo_root"/packages/*; do
          [ -d "$package" ] || continue

          name="$(basename "$package")"
          link_root="$package_root/$name"
          link_path="$link_root/[link]"

          mkdir -p "$link_root"
          rm -rf "$link_path"
          mkdir -p "$link_path"

          for entry in "$package"/* "$package"/.[!.]* "$package"/..?*; do
            [ -e "$entry" ] || continue

            entry_name="$(basename "$entry")"
            [ "$entry_name" = ".git" ] && continue

            ln -s "$entry" "$link_path/$entry_name" 2>/dev/null || cp -R "$entry" "$link_path/$entry_name"
          done

          # Airship's GitDependency.isGitDependencyInstalled checks for a .git
          # child. The linked package contents are still the monorepo package,
          # but this sentinel keeps Airship from cloning archived repos over it.
          mkdir -p "$link_path/.git"
        done

        normalized_targets="$(printf '%s' "$PREBUILD_TARGETS" | tr ',;' '  ')"

        if [ -n "$normalized_targets" ]; then
          mvn -f "$package_root/Flat/[link]/pom.xml" install
        fi

        for target in $normalized_targets; do
          case "$(printf '%s' "$target" | tr '[:upper:]' '[:lower:]')" in
            es6)
              runtime_package="Flat-ES6"
              ;;
            js)
              runtime_package="Flat-JS"
              ;;
            java)
              runtime_package="Flat-Java"
              ;;
            "")
              continue
              ;;
            *)
              echo "Unknown Airship prebuild target: $target" >&2
              exit 1
              ;;
          esac

          if [ -f "$package_root/$runtime_package/[link]/pom.xml" ]; then
            mvn -f "$package_root/$runtime_package/[link]/pom.xml" install
          fi
        done
