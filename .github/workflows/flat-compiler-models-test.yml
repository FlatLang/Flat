name: Flat-Compiler-Models / Test Flat-Compiler-Models

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 8 * * *'

env:
  LOGGING_DEFAULT_SHOW_PREFIX: true
  LOGGING_DEFAULT_LOGGING_LEVEL: DEBUG
  LOGGING_DEFAULT_SHOW_FORMATTING: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.8.0
        with:
          java-version: 8

      - uses: actions/checkout@v4

      - name: Link monorepo packages for Airship
        uses: ./.github/actions/setup-flat-monorepo

      - name: Download latest Airship
        uses: FlatLang/fetch-airship@master
        with:
          includePrerelease: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-build-${{ env.cache-name }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Build Flat-Compiler-Models Test
        run: |
          node airship.js --use-links -f packages/Flat-Compiler-Models install test -t es6

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test.js
          path: packages/Flat-Compiler-Models/dist/es6/test.js

      - name: Run Flat-Compiler-Models Test
        run: |
          node airship.js --use-links -f packages/Flat-Compiler-Models run test