name: Flat-Core / Build Flat-Core ES6

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 5 * * *'

env:
  LOGGING_DEFAULT_SHOW_PREFIX: true
  LOGGING_DEFAULT_LOGGING_LEVEL: TRACE
  LOGGING_DEFAULT_SHOW_FORMATTING: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.8.0
        with:
          java-version: 8

      - uses: actions/checkout@v4

      - name: Download latest Airship
        uses: ./.github/actions/download-airship
        with:
          repo: ${{ github.repository }}
          includePrerelease: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-build-${{ env.cache-name }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Link monorepo packages for Airship
        uses: ./.github/actions/setup-flat-monorepo
        with:
          prebuild-targets: es6 flatc

      - name: Build Flat-Core with flatc
        env:
          LOGGING_DEFAULT_SHOW_PREFIX: false
          LOGGING_DEFAULT_LOGGING_LEVEL: INFO
        run: |
          node airship.js --use-links -f packages/Flat-Core install --flatc-runtime flat -t es6
