name: Airship / Create Airship Prerelease

on:
  push:
    tags:
      - 'airship-v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+*'
      - 'airship-*-nightly-*'
      - 'airship-master-[0-9a-f]+'

jobs:
  create-prerelease:

    runs-on: ubuntu-latest

    steps:
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.8.0
        with:
          java-version: 8

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download bootstrap Airship
        uses: FlatLang/fetch-airship@master
        with:
          repo: FlatLang/Airship
          includePrerelease: true
          token: ${{ secrets.WORKFLOW_MANAGEMENT_TOKEN }}
          target: bootstrap-airship.js

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-build-${{ env.cache-name }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Link monorepo packages for Airship
        uses: ./.github/actions/setup-flat-monorepo
        with:
          prebuild-targets: es6

      - name: Build Airship es6
        run: |
          node bootstrap-airship.js --use-links -f packages/Airship install -t es6

      - name: Stage Airship artifact
        run: |
          cp packages/Airship/dist/airship.js airship.js

      - name: Create release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          stable_release="$(gh release list --repo "${{ github.repository }}" --limit 100 --exclude-drafts --json tagName,isPrerelease --jq '.[] | select(.tagName | startswith("airship-")) | select(.isPrerelease == false) | .tagName' | head -n 1 || true)"
          latest_release="$(gh release list --repo "${{ github.repository }}" --limit 100 --exclude-drafts --json tagName --jq '.[] | select(.tagName | startswith("airship-")) | .tagName' | head -n 1 || true)"

          : > airship-release-body.md

          if [[ -n "$stable_release" ]]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${stable_release}...${{ github.ref_name }}" >> airship-release-body.md
          else
            echo "Initial Airship prerelease from the Flat monorepo." >> airship-release-body.md
          fi

          if [[ -n "$latest_release" && "$latest_release" != "$stable_release" ]]; then
            echo "**Latest Changelog**: https://github.com/${{ github.repository }}/compare/${latest_release}...${{ github.ref_name }}" >> airship-release-body.md
          fi

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "airship.js"
          token: ${{ secrets.WORKFLOW_MANAGEMENT_TOKEN }}
          tag: "${{github.ref_name}}"
          prerelease: true
          bodyFile: airship-release-body.md
          generateReleaseNotes: false
