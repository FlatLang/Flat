name: Flat-Java-Compiler / Build Flat

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 5 * * *"

env:
  LOGGING_DEFAULT_SHOW_PREFIX: true
  LOGGING_DEFAULT_LOGGING_LEVEL: TRACE
  LOGGING_DEFAULT_SHOW_FORMATTING: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Flat Testing
        uses: actions/checkout@v4
        with:
          repository: BSteffaniak/Flat-Testing
          path: Flat-Testing

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Build CLI
        run: |
          mvn -f packages/Flat-Java-Compiler/pom.xml install

      - name: Build JS Writer
        run: |
          mvn -f packages/Flat-JS/pom.xml install

      - name: Checkout SimpleGapRuleFlat
        uses: actions/checkout@v4
        with:
          repository: BSteffaniak/SimpleGapRuleFlat
          path: SimpleGapRuleFlat

      - name: Build Stability Test
        run: |
          java -jar packages/Flat-Java-Compiler/target/flatc.jar \
            packages/Stability-Test/src \
            Flat-Testing/example \
            SimpleGapRuleFlat \
            -l packages/Flat-Core \
            -l packages/Datastruct \
            -l packages/Regex \
            -l packages/Test \
            -l packages/Compiler-String-Extensions \
            -l packages/Network \
            -l packages/MySQL \
            -l packages/Redis \
            -l packages/Svg \
            -l packages/Json \
            -l packages/Logger \
            -l packages/CoLorIzer \
            -l packages/IO \
            -l packages/Time \
            -l packages/Math \
            -l packages/System \
            -l packages/Stream \
            -l packages/Event-Stream \
            -l packages/Console-Escape-Codes \
            -l packages/Thread \
            -l packages/Future \
            -x packages/Future/src/**/*_Test*.flat \
            -l packages/NodeImport \
            -install-dir packages \
            -main stabilitytest/StabilityTest \
            -o packages/Stability-Test/dist/js/test.js \
            -target js

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test.js
          path: packages/Stability-Test/dist/js/test.js

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Stability Test
        run: |
          node packages/Stability-Test/dist/js/test.js

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test.js
          path: packages/Stability-Test/dist/js/test.js

      - name: Build SimpleGapRule Test
        run: |
          java -jar packages/Flat-Java-Compiler/target/flatc.jar \
            SimpleGapRuleFlat \
            -l packages/Flat-Core \
            -l packages/Datastruct \
            -l packages/Regex \
            -l packages/Test \
            -l packages/Json \
            -l packages/Logger \
            -l packages/CoLorIzer \
            -l packages/Compiler-String-Extensions \
            -l packages/IO \
            -l packages/Time \
            -l packages/System \
            -l packages/Stream \
            -l packages/Event-Stream \
            -l packages/Console-Escape-Codes \
            -l packages/Future \
            -x packages/Future/src/**/*_Test*.flat \
            -l packages/NodeImport \
            -install-dir packages \
            -main simplegaprule/AllTestsRunner \
            -o ./SimpleGapRuleFlat/SimpleGapRuleTests \
            -target js

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: SimpleGapRuleTests.js
          path: SimpleGapRuleFlat/SimpleGapRuleTests.js

      - name: Run SimpleGapRule Test
        working-directory: SimpleGapRuleFlat
        run: |
          node ./SimpleGapRuleTests.js
